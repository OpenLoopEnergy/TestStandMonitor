name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest backend/tests/ -v --tb=short -m "not slow"
        env:
          DATABASE_URL: "sqlite:///:memory:"
          EXPORT_TIMEZONE: "UTC"
          AZURE_TENANT_ID: ""
          AZURE_CLIENT_ID: ""
          AZURE_CLIENT_SECRET: ""

  frontend-checks:
    name: Frontend (tsc + eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/teststandfrontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/teststandfrontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm test
